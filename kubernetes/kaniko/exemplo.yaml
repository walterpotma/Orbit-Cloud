apiVersion: batch/v1
kind: Job
metadata:
  name: build-orbitcloud-ui-v0133
spec:
  template:
    spec:
      containers:
      - name: kaniko
        image: gcr.io/kaniko-project/executor:latest
        args:
        - "--dockerfile=Dockerfile"
        - "--context=git://github.com/walter/orbit-ui.git"
        - "--destination=seu-registry.com/orbitcloud-ui:0.1.33"
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi" # Aqui você controla o "peso" do build!
      restartPolicy: Never